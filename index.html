<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="calculator">
    <div class="display">
      <div class="expr" id="expr"></div>
      <div class="val" id="val">0</div>
    </div>
    <div class="grid">
      <button class="clear" onclick="calc('clear')">C</button>
      <button class="op"    onclick="calc('op','/')">÷</button>
      <button class="op"    onclick="calc('op','*')">×</button>
      <button class="op"    onclick="calc('op','-')">−</button>

      <button onclick="calc('digit','7')">7</button>
      <button onclick="calc('digit','8')">8</button>
      <button onclick="calc('digit','9')">9</button>
      <button class="op"    onclick="calc('op','+')">+</button>

      <button onclick="calc('digit','4')">4</button>
      <button onclick="calc('digit','5')">5</button>
      <button onclick="calc('digit','6')">6</button>
      <button class="eq"    onclick="calc('equals')">=</button>

      <button onclick="calc('digit','1')">1</button>
      <button onclick="calc('digit','2')">2</button>
      <button onclick="calc('digit','3')">3</button>

      <button class="zero" onclick="calc('digit','0')">0</button>
      <button onclick="calc('dot')">.</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
